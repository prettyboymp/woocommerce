name: Milestone Manager

on:
    # Retired - we will want to be able to milestone PRs on trunk and other release branches as a way to track what must be merged prior to a release.
    #pull_request_target:
    #    types: [milestoned]

permissions: {}

jobs:
    remove-milestone-from-unmerged-prs:
        name: "Remove Milestone from Unmerged PRs"
        if: github.event.pull_request.merged != true
        runs-on: ubuntu-latest
        permissions:
            issues: write
            pull-requests: write
        steps:
            - uses: actions/github-script@v6
              with:
                  script: |
                      github.rest.issues.update({
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          issue_number: context.payload.pull_request.number,
                          milestone: null,
                      });
