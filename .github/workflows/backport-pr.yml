name: Backport PR

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'Pull request number to backport'
        required: true
      target_branch:
        description: 'Branch to backport into'
        required: true

jobs:
  backport:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Run backport logic
      uses: actions/github-script@v7
      with:
        script: |
          const { execSync } = require('child_process');
          
          const { owner, repo } = context.repo;
          const prNumber = context.payload.inputs.pr_number;
          const targetBranch = context.payload.inputs.target_branch;

          core.info(`Starting backport of PR#${prNumber} to branch ${targetBranch}`);

          async function main() {
            // Get original PR details
            const { data: pr } = await github.rest.pulls.get({
              owner,
              repo,
              pull_number: prNumber
            });

            if (pr.base.ref === targetBranch) {
              core.info("PR already targets branch: " + targetBranch);
              return;
            }

            // Check if merge_commit_sha exists
            if (!pr.merge_commit_sha) {
              core.setFailed(`PR #${prNumber} has no merge commit (may be squashed or rebased)`);
              return;
            }

            // Fetch the original PR's branch to get the commit
            execSync(`git fetch origin ${pr.head.ref}:${pr.head.ref}`);

            const tempBranch = `backport-${prNumber}-to-${targetBranch.replace(/\//g, '-')}`;

            // Git operations
            execSync(`git fetch origin ${targetBranch}`);
            execSync(`git checkout -b ${tempBranch} origin/${targetBranch}`);

            let hasConflicts = false;
            try {
              core.info(`cherry-picking ${pr.merge_commit_sha}`);
              execSync(`git cherry-pick -x ${pr.merge_commit_sha}`, { stdio: 'inherit' });
            } catch (err) {
              // Log detailed error diagnostics
              core.error(`Cherry-pick failed for commit ${pr.data.merge_commit_sha}:`);
              core.error(err.stderr || err.message);

              // Stage all files with conflicts (unmerged)
              const statusOutput = execSync('git status --porcelain').toString();
              const conflictedFiles = statusOutput
                .split('\n')
                .filter(line => line.startsWith('UU '))
                .map(line => line.slice(3).trim())
                .filter(f => f.length > 0);

              if (conflictedFiles.length === 0) {
                core.setFailed("Cherry-pick failed, but no conflicted files found. " + err);
                return;
              }

              hasConflicts = true;

              // Stage the conflicted files as-is (with conflict markers)
              execSync(`git add ${conflictedFiles.map(f => `"${f}"`).join(' ')}`);

              core.info('Committing unresolved conflicts.');
              // Commit the unresolved conflicts
              execSync(`git commit -m "Cherry-pick ${pr.merge_commit_sha} with unresolved conflicts from #${prNumber}"`);
            }

            // Check for fuzzy matches
            const hasFuzz = ! hasConflicts && execSync(`git log -1`).toString().includes('fuzzy');
            core.info(`Pushing branch ${tempBranch} to origin.`);
            execSync(`git push origin ${tempBranch}`);

            // Create new PR
            const { data: newPR } = await github.rest.pulls.create({
              owner,
              repo,
              head: tempBranch,
              base: targetBranch,
              title: `[Backport ${targetBranch}] ${pr.title}`,
              body: `Backport of #${prNumber}\n\n${pr.body}`
            });

            core.info('PR#${newPR.number} created.')

            // Assign and notify
            const assignee = pr.merged_by?.login || pr.user.login;
            await github.rest.issues.addAssignees({
              owner,
              repo,
              issue_number: newPR.number,
              assignees: [assignee]
            });

            core.info('PR#${newPR.number} assigned to ${assignee}.')

            if (hasConflicts) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: newPR.number,
                body: "⚠️ Backport contains conflicts that must be resolved before merging!"
              });
            } else if (hasFuzz) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: newPR.number,
                body: "⚠️ Backport contains fuzzy matches - manual review needed!"
              });
            } else {
              try {
                await github.rest.pulls.merge({
                  owner,
                  repo,
                  pull_number: newPR.number,
                  merge_method: "squash"
                });
              } catch (mergeErr) {
                core.info("Auto-merge failed: " + mergeErr.message);
              }
            }

            // Update original PR
            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: prNumber,
              body: `✅ Backport created: #${newPR.number}`
            });
          }

          main().catch(err => {
            core.setFailed(err.message);
          });
