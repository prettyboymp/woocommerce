name: Backport PR

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'Pull request number to backport'
        required: true
      target_branch:
        description: 'Branch to backport into'
        required: true

env:
    GIT_COMMITTER_NAME: 'WooCommerce Bot'
    GIT_COMMITTER_EMAIL: 'no-reply@woocommerce.com'
    GIT_AUTHOR_NAME: 'WooCommerce Bot'
    GIT_AUTHOR_EMAIL: 'no-reply@woocommerce.com'

jobs:
  cherry-pick:
    runs-on: ubuntu-latest
    permissions:
        contents: write
        pull-requests: write
        issues: write
    steps:
      - name: Fetch and Validate PR
        id: fetch_pr_details
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ github.event.inputs.pr_number }}
          TARGET_BRANCH: ${{ github.event.inputs.target_branch }}
        with:
          script: |
            const prNumber = process.env.PR_NUMBER;
            const targetBranch = process.env.TARGET_BRANCH;
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber
            });

            if (pr.base.ref === targetBranch) {
              core.setFailed(`PR already targets branch: ${targetBranch}`);
              return;
            }

            if( !pr.merged ) {
              core.setFailed(`PR #${prNumber} cannot be backported until it has been merged.`)
              return;
            }

            if (!pr.merge_commit_sha) {
              core.setFailed(`PR #${prNumber} has no merge commit (may be squashed or rebased)`);
              return;
            }

            core.setOutput('PR_SHA', pr.merge_commit_sha);
            core.setOutput('CHERRY_PICK_BRANCH', `backport-PR-${prNumber}-to-${targetBranch.replace(/\//g, '-')}`);

      # Checkout the PR Merge Commit it is accessible later without having to clone the full repository.
      - name: Checkout Target Branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.target_branch }}

      - name: Create a cherry pick branch based on the target branch
        run: git checkout -b $CHERRY_PICK_BRANCH
        env:
          CHERRY_PICK_BRANCH: ${{ steps.fetch_pr_details.outputs.CHERRY_PICK_BRANCH }}

      - name: Fetch PR SHA
        run: git fetch origin $PR_SHA
        env:
          PR_SHA: ${{ steps.fetch_pr_details.outputs.PR_SHA }}

      - name: Cherry pick
        id: cherry-pick
        uses: actions/github-script@v7
        env:
          PR_SHA: ${{ steps.fetch_pr_details.outputs.PR_SHA }}
          PR_NUMBER: ${{ github.event.inputs.pr_number }}
          CHERRY_PICK_BRANCH: ${{ steps.fetch_pr_details.outputs.CHERRY_PICK_BRANCH }}
        with:
          script: |
            const { execSync } = require('child_process');
            let hasConflicts = false;
            let hasFuzz = false;

            try {
              core.info(`cherry-picking ${process.env.PR_SHA}`);
              execSync(`git cherry-pick -m1 ${process.env.PR_SHA}`, { stdio: 'inherit' });
            } catch (err) {
              core.error(`Cherry-pick failed for commit ${process.env.PR_SHA}:`);
              core.error(err.stderr || err.message);

              // Stage all files with conflicts (unmerged)
              const statusOutput = execSync('git status --porcelain').toString();
              const conflictedFiles = statusOutput
                .split('\n')
                .filter(line => line.startsWith('UU '))
                .map(line => line.slice(3).trim())
                .filter(f => f.length > 0);

              if (conflictedFiles.length === 0) {
                core.setFailed("Cherry-pick failed, but no conflicted files found. " + err);
                core.setOutput('hasConflicts', true);
                core.setOutput('hasFuzz', false);
                return;
              }

              hasConflicts = true;
              execSync(`git add ${conflictedFiles.map(f => `"${f}"`).join(' ')}`);
              core.info('Committing unresolved conflicts.');
              execSync(`git commit -m "Cherry-pick ${process.env.PR_SHA} with unresolved conflicts from #${process.env.PR_NUMBER}"`);
            }

            // Check for fuzzy matches
            hasFuzz = !hasConflicts && execSync(`git log -1`).toString().includes('fuzzy');
            core.setOutput('hasConflicts', hasConflicts);
            core.setOutput('hasFuzz', hasFuzz);


      - name: Push cherry pick branch up
        run: git push origin $CHERRY_PICK_BRANCH
        env:
          CHERRY_PICK_BRANCH: ${{ steps.fetch_pr_details.outputs.CHERRY_PICK_BRANCH }}

      - name: Create Cherry Pick Pull Request
        uses: actions/github-script@v7
        env:
          TARGET_BRANCH: ${{ github.event.inputs.target_branch }}
          PR_NUMBER: ${{ github.event.inputs.pr_number }}
          CHERRY_PICK_BRANCH: ${{ steps.fetch_pr_details.outputs.CHERRY_PICK_BRANCH }}
          CHERRY_PICK_HAD_FUZZ: ${{ steps.cherry-pick.outputs.hasFuzz }}
          CHERRY_PICK_HAD_CONFLICTS: ${{ steps.cherry-pick.outputs.hasConflicts }}
        with:
          script: |
            const { owner, repo } = context.repo;
            const prNumber = process.env.PR_NUMBER;
            const targetBranch = process.env.TARGET_BRANCH;
            const cherryPickBranch = process.env.CHERRY_PICK_BRANCH;

            const { data: original_pr } = await github.rest.pulls.get({
              owner,
              repo,
              pull_number: prNumber
            });

            // Create new PR
            const { data: newPR } = await github.rest.pulls.create({
              owner,
              repo,
              head: cherryPickBranch,
              base: targetBranch,
              title: `[Backport ${targetBranch}] ${original_pr.title}`,
              body: `Backport of #${prNumber}\n\n${original_pr.body}`
            });

            core.info(`PR#${newPR.number} created.`);

            // Assign and notify
            const assignee = original_pr.merged_by?.login || original_pr.user.login;
            await github.rest.issues.addAssignees({
              owner,
              repo,
              issue_number: newPR.number,
              assignees: [assignee]
            });

            core.info(`PR#${newPR.number} assigned to ${assignee}.`);

            if (process.env.CHERRY_PICK_HAD_CONFLICTS === 'true') {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: newPR.number,
                body: "⚠️ Backport contains conflicts that must be resolved before merging!"
              });
            } else if (process.env.CHERRY_PICK_HAD_FUZZ === 'true') {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: newPR.number,
                body: "⚠️ Backport contains fuzzy matches - manual review needed!"
              });
            } else {
              try {
                await github.rest.pulls.merge({
                  owner,
                  repo,
                  pull_number: newPR.number,
                  merge_method: "squash"
                });
              } catch (mergeErr) {
                core.setFailed("Auto-merge failed: " + mergeErr.message);
                return;
              }
            }

            // Update original PR
            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: prNumber,
              body: `✅ Backport created: #${newPR.number}`
            });

