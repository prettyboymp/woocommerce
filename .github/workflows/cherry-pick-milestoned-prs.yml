name: Cherry-pick Milestoned PRs to Release Branches
on:
  pull_request:
    types: [closed, milestoned]
    branches: [trunk]

jobs:
  prepare:
    if: |
      github.event.pull_request.merged == true &&
      github.event.pull_request.base.ref == 'trunk' &&
      github.event.pull_request.milestone != null
    runs-on: ubuntu-latest
    outputs:
      branches: ${{ steps.get-branches.outputs.branches }}
      pr_number: ${{ steps.set-vars.outputs.pr_number }}
      milestone: ${{ steps.set-vars.outputs.milestone }}
    steps:
      # Set basic PR information
      - name: Set variables
        id: set-vars
        run: |
          echo "pr_number=${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
          echo "milestone=${{ github.event.pull_request.milestone.title }}" >> $GITHUB_OUTPUT

      # Extract base version from milestone (e.g., 9.9 from 9.9.0)
      - name: Extract version from milestone
        id: extract-version
        run: |
          MILESTONE="${{ github.event.pull_request.milestone.title }}"
          if [[ "$MILESTONE" =~ ^([0-9]+\.[0-9]+)\.[0-9]+$ ]]; then
            echo "base_version=${BASH_REMATCH[1]}" >> $GITHUB_OUTPUT
          else
            echo "::error::Invalid milestone format: $MILESTONE"
            exit 1
          fi

      # Identify release branches to cherry-pick to
      - name: Get release branches
        id: get-branches
        env:
          BASE_VERSION: ${{ steps.extract-version.outputs.base_version }}
        run: |
          MAJOR=$(echo $BASE_VERSION | cut -d. -f1)
          MINOR=$(echo $BASE_VERSION | cut -d. -f2)
          branches=()
          branch_count=0
          max_branches=2  # Limit to 2 most recent release branches

          current_major=$MAJOR
          current_minor=$MINOR

          while [ $branch_count -lt $max_branches ]; do
            branch="release/$current_major.$current_minor"
            response=$(curl -s -o /dev/null -w "%{http_code}" \
              -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              "https://api.github.com/repos/${{ github.repository }}/branches/$branch")
            
            if [ "$response" -eq 200 ]; then
              branches+=("$branch")
              branch_count=$((branch_count + 1))
              
              # Compute next version
              if [ "$current_minor" -eq 9 ]; then
                current_major=$((current_major + 1))
                current_minor=0
              else
                current_minor=$((current_minor + 1))
              fi
            else
              break
            fi
          done

          # Output branches as JSON array
          json="["
          sep=""
          for b in "${branches[@]}"; do
            json="$json$sep\"$b\""
            sep=","
          done
          json="$json]"
          echo "branches=$json" >> $GITHUB_OUTPUT


  # Perform cherry-pick to all target branches
  cherry-pick:
    needs: prepare
    uses: ./.github/workflows/shared-cherry-pick.yml
    with:
      pr_number: ${{ needs.prepare.outputs.pr_number }}
      target_branch: ${{ matrix.branch }}
    strategy:
      fail-fast: false  # Continue even if one cherry-pick fails
      matrix:
        branch: ${{ fromJson(needs.prepare.outputs.branches) }}

  # Handle successful cherry-picks
  handle-successes:
    needs: [prepare, cherry-pick]
    if: ${{ always() && needs.cherry-pick.result == 'success' && needs.cherry-pick.outputs.cherry_pick_pr_number }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        branch: ${{ fromJson(needs.prepare.outputs.branches) }}
    steps:
      # Add original milestone to new PR
      - name: Add milestone
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ needs.cherry-pick.outputs.cherry_pick_pr_number }},
              milestone: '${{ github.event.pull_request.milestone.number }}'
            })

      # Comment on original PR about cherry-pick success
      - name: Comment on original PR about cherry-pick success
        uses: actions/github-script@v7
        env:
          TARGET_BRANCH: ${{ matrix.branch }}
          CHERRY_PICK_PR_NUMBER: ${{ needs.cherry-pick.outputs.cherry_pick_pr_number }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          script: |
            const cherryPickPrNumber = process.env.CHERRY_PICK_PR_NUMBER;
            const targetBranch = process.env.TARGET_BRANCH;
            const { owner, repo } = context.repo;

            let cherryPickPr;
            try {
              cherryPickPr = (await github.rest.pulls.get({
                owner,
                repo,
                pull_number: parseInt(cherryPickPrNumber)
              })).data;
            } catch (e) {
              core.setFailed("Could not fetch cherry-pick PR details: " + e.message);
              return;
            }

            const cherryPickPrUrl = cherryPickPr.html_url;
            const cherryPickPrTitle = cherryPickPr.title;

            const body =
              'IMPORTANT: Merging this PR to the appropriate branches is critical to the release process and ensures that the bug does not cause regressions in the future releases.\n\n' +
              `Cherry picking was successful for \`${targetBranch}\`. Please merge the following PR: [${cherryPickPrTitle}](${cherryPickPrUrl})`;

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: parseInt('${{ needs.prepare.outputs.pr_number }}'),
              body
            });

      
      # Notify Slack about successful cherry-pick
      - name: Notify Slack on success
        uses: archive/github-actions-slack@c643e5093620d65506466f2c9b317d5d29a5e517 # v2.10.1
        env:
          CHERRY_PICK_PR_URL: https://github.com/${{ github.repository }}/pull/${{ needs.cherry-pick.outputs.cherry_pick_pr_number }}
          SOURCE_PR_URL: ${{ github.event.pull_request.html_url }}
          SOURCE_PR_NUMBER: ${{ github.event.pull_request.number }}
          SOURCE_PR_TITLE: ${{ github.event.pull_request.title }}
        with:
          slack-bot-user-oauth-access-token: ${{ secrets.CODE_FREEZE_BOT_TOKEN }}
          slack-channel: ${{ secrets.WOO_RELEASE_SLACK_NOTIFICATION_CHANNEL }}
          slack-text: |
            :info: *Cherry pick <${{ env.CHERRY_PICK_PR_URL }}|created> (`trunk` → `${{ matrix.branch }}`)* Please ensure <${{ env.CHERRY_PICK_PR_URL }}|this cherry pick> is merged before releasing. Source PR: _<${{ env.SOURCE_PR_URL }}|#${{ env.SOURCE_PR_NUMBER }} - ${{ env.SOURCE_PR_TITLE }}>_.

  # Handle failed cherry-picks
  handle-failures:
    needs: [prepare, cherry-pick]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        branch: ${{ fromJson(needs.prepare.outputs.branches) }}
    if: ${{ always() && needs.cherry-pick.result == 'failure' }}
    steps:
      - name: Handle failure for ${{ matrix.branch }}
        if: ${{ needs.cherry-pick.outputs.status == 'failed' }}
        run: echo "Processing failure for ${{ matrix.branch }}"

      # Label original PR with failure tag
      - name: Add "cherry pick failed" label
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: parseInt('${{ needs.prepare.outputs.pr_number }}'),
              labels: ['cherry pick failed']
            })

      # Comment on original PR about failure
      - name: Comment on original PR
        uses: actions/github-script@v7
        env:
          ERROR_MESSAGE: ${{ needs.cherry-pick.outputs.errorMessage || 'Unknown error' }}
          TARGET_BRANCH: ${{ matrix.branch }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        with:
          script: |
            const pr = (await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: parseInt('${{ needs.prepare.outputs.pr_number }}')
            })).data;

            const merger = pr.merged_by?.login ? `@${pr.merged_by.login}` : '';
            const errorMsg = process.env.ERROR_MESSAGE;
            const targetBranch = process.env.TARGET_BRANCH;
            const workflowLink = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${process.env.GITHUB_RUN_ID}`;

            const body = 
              (merger ? merger + ' ' : '') +
              '⚠️ **Cherry-pick to `' + targetBranch + '` failed.**\n\n' +
              '**Error:** ' + errorMsg + '\n\n' +
              '---\n\n' +
              'IMPORTANT: Merging this PR to the appropriate branches is critical to the release process.\n\n' +
              '**Workflow run:** ' + workflowLink;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: parseInt('${{ needs.prepare.outputs.pr_number }}'),
              body: body
            });

      # Notify Slack about failed cherry-pick
      - name: Notify Slack on failure
        uses: archive/github-actions-slack@c643e5093620d65506466f2c9b317d5d29a5e517 # v2.10.1
        env:
          # Link to the workflow run for debugging
          WORKFLOW_RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          # Source PR details
          SOURCE_PR_URL: ${{ github.event.pull_request.html_url }}
          SOURCE_PR_NUMBER: ${{ github.event.pull_request.number }}
          SOURCE_PR_TITLE: ${{ github.event.pull_request.title }}
          # Target branch for cherry-pick
          TARGET_BRANCH: ${{ matrix.branch }}
        with:
          slack-bot-user-oauth-access-token: ${{ secrets.CODE_FREEZE_BOT_TOKEN }}
          slack-channel: ${{ secrets.WOO_RELEASE_SLACK_NOTIFICATION_CHANNEL }}
          slack-text: |
            :warning: *Cherry pick from `trunk` to `${{ env.TARGET_BRANCH }}` <${{ env.WORKFLOW_RUN_URL }}|failed>*  
            Please resolve before releasing.  
            Source PR: _<${{ env.SOURCE_PR_URL }}|#${{ env.SOURCE_PR_NUMBER }} - ${{ env.SOURCE_PR_TITLE }}>_.

