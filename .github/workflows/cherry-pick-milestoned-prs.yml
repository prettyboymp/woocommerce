name: Cherry-pick Milestoned PRs to Release Branches
on:
  pull_request:
    types: [closed, milestoned]
    branches: [trunk]

jobs:
  prepare:
    if: |
      github.event.pull_request.merged == true &&
      github.event.pull_request.base.ref == 'trunk' &&
      github.event.pull_request.milestone != null
    runs-on: ubuntu-latest
    outputs:
      branches: ${{ steps.get-branches.outputs.branches }}
      pr_number: ${{ steps.set-vars.outputs.pr_number }}
      milestone: ${{ steps.set-vars.outputs.milestone }}
    steps:
      - name: Set variables
        id: set-vars
        run: |
          echo "pr_number=${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
          echo "milestone=${{ github.event.pull_request.milestone.title }}" >> $GITHUB_OUTPUT

      - name: Extract version from milestone
        id: extract-version
        run: |
          MILESTONE="${{ github.event.pull_request.milestone.title }}"
          if [[ "$MILESTONE" =~ ^([0-9]+\.[0-9]+)\.[0-9]+$ ]]; then
            echo "base_version=${BASH_REMATCH[1]}" >> $GITHUB_OUTPUT
          else
            echo "::error::Invalid milestone format: $MILESTONE"
            exit 1
          fi

      - name: Get release branches
        id: get-branches
        env:
          BASE_VERSION: ${{ steps.extract-version.outputs.base_version }}
        run: |
          MAJOR=$(echo $BASE_VERSION | cut -d. -f1)
          MINOR=$(echo $BASE_VERSION | cut -d. -f2)
          branches=()
          current_minor=$MINOR
          branch_count=0
          max_branches=2 # We limit to 2, but we could increase this to potentially handle backporting security fixes further.

          while [ $branch_count -lt $max_branches ]; do
            branch="release/$MAJOR.$current_minor"
            response=$(curl -s -o /dev/null -w "%{http_code}" \
              -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              "https://api.github.com/repos/${{ github.repository }}/branches/$branch")
            if [ "$response" -eq 200 ]; then
              branches+=("$branch")
              current_minor=$((current_minor + 1))
              branch_count=$((branch_count + 1))
            else
              break
            fi
          done

          # Output as a JSON array without jq
          json="["
          sep=""
          for b in "${branches[@]}"; do
            json="$json$sep\"$b\""
            sep=","
          done
          json="$json]"
          echo "JSON output: $json"
          echo "branches=$json" >> $GITHUB_OUTPUT


  cherry-pick:
    needs: prepare
    uses: ./.github/workflows/shared-cherry-pick.yml
    with:
      pr_number: ${{ needs.prepare.outputs.pr_number }}
      target_branch: ${{ matrix.branch }}
    strategy:
      fail-fast: false # Make sure we don't fail all jobs because one cherry pick fails.
      matrix:
        branch: ${{ fromJson(needs.prepare.outputs.branches) }}

  handle-successes:
    needs: [prepare, cherry-pick]
    if: ${{ always() && needs.cherry-pick.result == 'success' && needs.cherry-pick.outputs.cherry_pick_pr_number }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        branch: ${{ fromJson(needs.prepare.outputs.branches) }}
    steps:

      # Make sure the newly created PRs have the milestone set to the original milestone that triggered this flow to be sure they are merged prior to next releae of that version.
      - name: Add milestone
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ needs.cherry-pick.outputs.cherry_pick_pr_number }},
              milestone: '${{ github.event.pull_request.milestone.number }}'
            })
      - name: Notify Slack on success
        if: ${{ success() && inputs.skipSlackPing != true }}
        uses: archive/github-actions-slack@f530f3aa696b2eef0e5aba82450e387bd7723903 #v2.0.0
        with:
          slack-bot-user-oauth-access-token: ${{ secrets.CODE_FREEZE_BOT_TOKEN }}
          slack-channel: ${{ secrets.WOO_RELEASE_SLACK_NOTIFICATION_CHANNEL }}
          slack-optional-unfurl_links: false
          slack-optional-unfurl_media: false
          slack-text: |
            :info: *Cherry pick <${{ steps.cherry-pick-pr.outputs.cherry-pick-pr }}|created> (${{ needs.prep.outputs.version }} → `trunk`)* Please ensure <${{ steps.cherry-pick-pr.outputs.cherry-pick-pr }}|this cherry pick> is merged before releasing. Source PR: _<${{ needs.prep.outputs.prURL }}|#${{ needs.prep.outputs.pr }} - ${{ needs.prep.outputs.prTitle }}>_.

  handle-failures:
    needs: [prepare, cherry-pick]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        branch: ${{ fromJson(needs.prepare.outputs.branches) }}
    if: ${{ needs.cherry-pick.result == 'failure' }}
    steps:
      - name: Handle failure for ${{ matrix.branch }}
        if: ${{ needs.cherry-pick.outputs.status == 'failed' }}
        run: |
          echo "Handling failure for ${{ matrix.branch }}"

      - name: Add "cherry-pick-failed" label to original PR
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: parseInt('${{ needs.prepare.outputs.pr_number }}'),
              labels: ['cherry-pick-failed']
            })

      - name: Notify Slack on failure
        if: ${{ failure() && inputs.skipSlackPing != true }}
        uses: archive/github-actions-slack@f530f3aa696b2eef0e5aba82450e387bd7723903 #v2.0.0
        with:
          slack-bot-user-oauth-access-token: ${{ secrets.CODE_FREEZE_BOT_TOKEN }}
          slack-channel: ${{ secrets.WOO_RELEASE_SLACK_NOTIFICATION_CHANNEL }}
          slack-optional-unfurl_links: false
          slack-optional-unfurl_media: false
          slack-text: |
            :warning: *Cherry pick <https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|failed> (${{ needs.prep.outputs.version }} → `trunk`)* Please resolve before releasing. Source PR: _<${{ needs.prep.outputs.prURL }}|#${{ needs.prep.outputs.pr }} - ${{ needs.prep.outputs.prTitle }}>_.

      - name: Comment on original PR about cherry-pick failure
        uses: actions/github-script@v7
        env:
          ERROR_MESSAGE: ${{ needs.cherry-pick.outputs.errorMessage || 'Unknown error' }}
          TARGET_BRANCH: ${{ matrix.branch }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        with:
          script: |
            // Get PR details to find who merged it
            const pr = (await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: parseInt('${{ needs.prepare.outputs.pr_number }}')
            })).data;

            const merger = pr.merged_by && pr.merged_by.login ? `@${pr.merged_by.login}` : '';
            const errorMsg = process.env.ERROR_MESSAGE;
            const targetBranch = process.env.TARGET_BRANCH;
            const workflowLink = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${process.env.GITHUB_RUN_ID}`;

            const body = `
${merger ? merger + ' ' : ''}⚠️ **Cherry-pick to \`${targetBranch}\` failed.**

**Error:** ${errorMsg}

---

IMPORTANT: Merging this PR to the appropriate branches is critical to the release process and ensures that the bug does not cause regressions in future releases.

Cherry picking failed for ${targetBranch}. Please bring this to the release team's attention.

**Workflow run for debugging:** ${workflowLink}
          `;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: parseInt('${{ needs.prepare.outputs.pr_number }}'),
              body: body.trim()
            });
