  run-canonical-extensions-tests:
    runs-on: ubuntu-latest
    steps:
      - name: 'Run tests on the canonical extensions'
        shell: bash
        env:
            CANONICAL_EXTENSIONS: ${{ vars.CANONICAL_EXTENSIONS }}
        run: |
            IFS=$'\n' readarray -t repositories < <(echo $CANONICAL_EXTENSIONS)
            for repository in ${repositories[@]}; do
                echo "Repo: $repository"
            done
            exit 0
